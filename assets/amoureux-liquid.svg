<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 1120" role="img" aria-label="L'Amoureux - Tarocchi Liquidi">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="7" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7e2"/>
      <stop offset="1" stop-color="#d9c498"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4bf"/>
      <stop offset="0.45" stop-color="#caa45a"/>
      <stop offset="1" stop-color="#fff6cf"/>
    </linearGradient>
    <style>
      .ink{stroke:#211a13;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .thin{stroke:#211a13;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;fill:none}
      .gold{stroke:url(#gold);stroke-width:9;fill:none;filter:url(#glow)}
      .txt{font-family: Georgia, 'Times New Roman', serif;fill:#241b13;letter-spacing:.08em}
    </style>
  </defs>
